name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python-and-package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Enable Git symlinks on Windows
        if: runner.os == 'Windows'
        run: git config --global core.symlinks true
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Clean-clone bootstrap
        run: python plugins/job-application-suite/skills/apply-to-jobs/scripts/bootstrap.py --workspace .
      - name: Python tests
        run: python -m unittest discover -s plugins/job-application-suite/skills/apply-to-jobs/tests
      - name: Plugin and repository validation
        run: python scripts/validate_release.py

  local-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
        working-directory: dashboard
      - run: pnpm typecheck
        working-directory: dashboard
      - run: pnpm lint
        working-directory: dashboard
      - run: pnpm test
        working-directory: dashboard
      - run: pnpm build
        working-directory: dashboard
      - run: pnpm exec playwright install --with-deps chromium
        working-directory: dashboard
      - run: pnpm test:e2e
        working-directory: dashboard
      - run: pnpm audit --prod
        working-directory: dashboard

  hosted-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: npm
          cache-dependency-path: dashboard-sites/package-lock.json
      - run: npm ci
        working-directory: dashboard-sites
      - run: npm run lint
        working-directory: dashboard-sites
      - run: npm test
        working-directory: dashboard-sites
      - run: npm audit --omit=dev
        working-directory: dashboard-sites

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
